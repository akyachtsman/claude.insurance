name: Pages Deploy Retry
# Auto-heals transient GitHub Pages deploy failures. The managed "pages build and
# deployment" workflow occasionally fails its publish step with "Deployment failed,
# try again later." â€” a GitHub-side blip, not a build problem â€” which otherwise
# leaves the site on the previous version until someone manually re-runs it.
#
# Triggered by `page_build` (the event GitHub actually emits for Pages builds â€” the
# dynamically-generated Pages deploy workflow does NOT fire `workflow_run`). Because
# page_build can arrive while the deploy is still in progress, we POLL the latest
# managed Pages run until it reaches a terminal state, then re-run it if it FAILED
# (a full re-run reliably clears the transient error). Bounded by run_attempt (< 4)
# so a genuinely broken deploy can't loop â€” then pages-monitor.yml opens its issue.
#
# Purely additive â€” no change to the Pages source or the existing deploy/monitor.
on:
  page_build:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

# Serialize retries so overlapping page_build events don't double-trigger a re-run.
concurrency:
  group: pages-retry
  cancel-in-progress: false

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Re-run the latest Pages deployment if it failed
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          latest() {
            gh api "repos/${REPO}/actions/runs?per_page=20" \
              --jq 'first(.workflow_runs[] | select(.name == "pages build and deployment"))'
          }
          run=$(latest)
          if [ -z "$run" ] || [ "$run" = "null" ]; then
            echo "No managed Pages deploy run found â€” nothing to do."; exit 0
          fi
          id=$(echo "$run" | jq -r '.id')
          attempt=$(echo "$run" | jq -r '.run_attempt')

          # page_build can fire mid-deploy â€” wait for this run to finish (up to ~3 min)
          # before deciding, so we don't skip a failure that's still in flight.
          status=$(echo "$run" | jq -r '.status')
          for i in $(seq 1 9); do
            [ "$status" = "completed" ] && break
            sleep 20
            run=$(gh api "repos/${REPO}/actions/runs/${id}" --jq '{status:.status, conclusion:.conclusion, run_attempt:.run_attempt}')
            status=$(echo "$run" | jq -r '.status')
          done
          concl=$(echo "$run" | jq -r '.conclusion')
          attempt=$(echo "$run" | jq -r '.run_attempt')
          echo "Latest Pages deploy: id=${id} status=${status} conclusion=${concl} attempt=${attempt}"

          if [ "$status" = "completed" ] && [ "$concl" = "failure" ] && [ "$attempt" -lt 4 ]; then
            echo "Deploy failed (attempt ${attempt}) â€” re-running to clear the transient publish error."
            sleep 15
            gh run rerun "$id" --repo "$REPO"
            echo "Requested re-run of Pages deploy ${id}."
          else
            echo "No retry needed."
          fi
