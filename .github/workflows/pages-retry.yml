name: Pages Deploy Retry
# Auto-heals transient GitHub Pages deploy failures. The managed "pages build and
# deployment" workflow occasionally fails its publish step with "Deployment failed,
# try again later." — a GitHub-side blip, not a build problem — which otherwise
# leaves the site on the previous version until someone manually re-runs it.
#
# Triggered by `page_build` (the event GitHub actually emits for Pages builds — the
# dynamically-generated Pages deploy workflow does NOT fire `workflow_run`, so that
# can't be used). On each build it looks up the latest managed Pages deploy run and,
# if it FAILED, re-runs it (a full re-run reliably clears the transient error).
# Bounded by run_attempt (< 4) so a genuinely broken deploy can't loop — after a few
# tries it stops and pages-monitor.yml opens its tracking issue.
#
# Purely additive — no change to the Pages source or the existing deploy/monitor.
on:
  page_build:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Re-run the latest failed Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Newest managed Pages deploy run (matched by its workflow name).
          run=$(gh api "repos/${REPO}/actions/runs?per_page=20" \
            --jq 'first(.workflow_runs[] | select(.name == "pages build and deployment"))')
          if [ -z "$run" ] || [ "$run" = "null" ]; then
            echo "No managed Pages deploy run found — nothing to do."
            exit 0
          fi
          id=$(echo "$run"      | jq -r '.id')
          status=$(echo "$run"  | jq -r '.status')
          concl=$(echo "$run"   | jq -r '.conclusion')
          attempt=$(echo "$run" | jq -r '.run_attempt')
          echo "Latest Pages deploy: id=${id} status=${status} conclusion=${concl} attempt=${attempt}"
          if [ "$status" = "completed" ] && [ "$concl" = "failure" ] && [ "$attempt" -lt 4 ]; then
            echo "Deploy failed (attempt ${attempt}) — re-running to clear the transient publish error."
            sleep 20
            gh run rerun "$id" --repo "$REPO"
            echo "Requested re-run of Pages deploy ${id}."
          else
            echo "No retry needed (not a bounded failure)."
          fi
